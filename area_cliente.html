    <script>
        // Quando a página terminar de carregar o HTML, executa a verificação do erro
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Se existir o parâmetro erro=1 na URL, dispara o SweetAlert animado
            if (urlParams.get('erro') === '1') {
                Swal.fire({
                    icon: 'error',
                    title: 'Acesso Negado',
                    text: 'E-mail corporativo ou palavra-passe incorretos. Por favor, tente novamente.',
                    confirmButtonColor: '#c8973a',
                    confirmButtonText: 'Tentar Novamente',
                    background: '#ffffff',
                    color: '#0f172a',
                    customClass: {
                        popup: 'swal2-custom-border'
                    }
                });
                
                // Limpa a URL para evitar que o erro volte a aparecer caso o utilizador atualize a página com F5
                window.history.replaceState(null, null, window.location.pathname);
            }
        });
    </script>
